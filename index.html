<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    O valor abaixo será substituído automaticamente pelo comando:
    flutter build web --base-href "/inspect-housekeeping-app/"
  -->
  /inspect-housekeeping-app/

  <meta charset="UTF-8">

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=Edge"
  >

  <meta
    name="description"
    content="Aplicativo de inspeções Housekeeping e EHS."
  >

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- Configurações para instalação no celular -->
  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="Inspect Housekeeping"
  >

  <meta
    name="theme-color"
    content="#00843D"
  >

  <!-- Ícone para dispositivos Apple -->
  icons/Icon-192.png

  <!-- Ícone do navegador -->
  <link
    rel="icon"
    type="image/png"
    href="favicon.png"
  >

  <!-- Manifesto do aplicativo -->
  <link
    rel="manifest"
    href="manifest.json"
  >

  <title>Inspect Housekeeping</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f4f7fb;
    }

    #inspect-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      box-sizing: border-box;
      padding: 32px;

      background-color: #f4f7fb;

      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    .inspect-loading-logo {
      width: 210px;
      max-width: 78vw;
      max-height: 130px;
      height: auto;

      margin-bottom: 32px;

      object-fit: contain;
    }

    .inspect-loading-spinner {
      width: 48px;
      height: 48px;

      box-sizing: border-box;

      border: 5px solid #d1d5db;
      border-top-color: #00843d;
      border-radius: 50%;

      animation:
        inspect-loading-spin
        0.8s
        linear
        infinite;
    }

    .inspect-loading-description {
      max-width: 340px;

      margin-top: 24px;

      color: #4b5563;

      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
    }

    .inspect-loading-detail {
      max-width: 340px;

      margin-top: 8px;

      color: #6b7280;

      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    @keyframes inspect-loading-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .inspect-loading-logo {
        width: 175px;
        max-height: 110px;
        margin-bottom: 28px;
      }

      .inspect-loading-description {
        font-size: 14px;
      }

      .inspect-loading-detail {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="inspect-loading-screen">
    images/FSQR_cargill.png

    <div class="inspect-loading-spinner"></div>

    <div class="inspect-loading-description">
      Iniciando o aplicativo
    </div>

    <div class="inspect-loading-detail">
      O servidor pode levar alguns segundos para responder.
    </div>
  </div>

  <script>
    window.addEventListener(
      'flutter-first-frame',
      function () {
        const loadingScreen =
          document.getElementById(
            'inspect-loading-screen'
          );

        if (loadingScreen) {
          loadingScreen.remove();
        }

        document.body.style.overflow = 'auto';
      }
    );
  </script>

  flutter_bootstrap.jsscript>
</body>
</html>
