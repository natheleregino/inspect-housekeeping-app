<!DOCTYPE html>
<html lang="pt-BR">
<head>
  /inspect-housekeeping-app/

  <meta charset="UTF-8">

  <meta
    http-equiv="X-UA-Compatible"
    content="IE=Edge"
  >

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Aplicativo de inspeções Housekeeping e EHS."
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="Inspect FSQR"
  >

  <meta
    name="theme-color"
    content="#F4F7FB"
  >

  icons/Icon-192.png

  <link
    rel="icon"
    type="image/png"
    href="favicon.png"
  >

  <link
    rel="manifest"
    href="manifest.json"
  >

  <title>Inspect FSQR</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #f4f7fb;
    }

    #inspect-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      box-sizing: border-box;
      padding: 32px;

      background-color: #f4f7fb;
      font-family: Arial, Helvetica, sans-serif;

      transition: opacity 200ms ease;
    }

    #inspect-loading-screen.oculto {
      opacity: 0;
      pointer-events: none;
    }

    .inspect-loading-spinner {
      width: 48px;
      height: 48px;

      box-sizing: border-box;

      border: 5px solid #d1d5db;
      border-top-color: #00843d;
      border-radius: 50%;

      animation: inspect-loading-spin 0.8s linear infinite;
    }

    .inspect-loading-text {
      margin-top: 22px;

      color: #4b5563;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }

    @keyframes inspect-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="inspect-loading-screen">
    <div class="inspect-loading-spinner"></div>

    <div class="inspect-loading-text">
      Iniciando o aplicativo...
    </div>
  </div>

  <script>
    function removerCarregamentoHtml() {
      const loadingScreen =
        document.getElementById(
          'inspect-loading-screen'
        );

      if (!loadingScreen) {
        return;
      }

      loadingScreen.classList.add('oculto');

      window.setTimeout(function () {
        loadingScreen.remove();
      }, 250);
    }

    window.addEventListener(
      'flutter-first-frame',
      removerCarregamentoHtml
    );
  </script>

  flutter_bootstrap.jsscript>
</body>
</html>
